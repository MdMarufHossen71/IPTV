<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV — Free Live TV Channels</title>
  <meta name="description" content="Watch 90+ free live TV channels in your browser. BD channels, news, sports, movies. No app, no registration." />
  <meta name="keywords" content="IPTV, live tv, free tv, bangladesh tv, m3u, m3u8, HLS stream, online tv" />
  <meta property="og:title" content="IPTV — Free Live TV Channels" />
  <meta property="og:description" content="Stream free live channels instantly — Bangladeshi, News, Sports, Movies & more." />
  <meta property="og:image" content="https://MdMarufHossen71.github.io/IPTV/assets/icons/og-image.png" />
  <meta property="og:url" content="https://MdMarufHossen71.github.io/IPTV/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="IPTV — Free Live TV Channels" />
  <meta name="twitter:description" content="90+ verified live channels — BD, News, Sports, Movies and more." />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="alternate icon" href="assets/icons/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">📺</div>
      <div class="brand-text">
        <span class="brand-name">IPTV</span>
        <span class="brand-sub">Free Live TV</span>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="btn-m3u" href="playlist.m3u" download title="Download M3U playlist for VLC/IPTV apps">⬇ M3U</a>
    </div>
  </header>

  <nav class="search-bar-wrap">
    <div class="search-inner">
      <input id="searchInput" type="search" placeholder="Search channels…" autocomplete="off" aria-label="Search channels" />
      <select id="countryFilter" aria-label="Filter by country">
        <option value="all">All Countries</option>
      </select>
    </div>
  </nav>

  <nav id="categoryTabs" class="tabs-wrap" aria-label="Category tabs">
    <div class="tabs-scroll">
      <button class="tab active" data-category="all">All</button>
      <button class="tab" data-category="Bangladeshi">🇧🇩 BD</button>
      <button class="tab" data-category="News">News</button>
      <button class="tab" data-category="Sports">Sports</button>
      <button class="tab" data-category="Entertainment">Entertainment</button>
      <button class="tab" data-category="Music">Music</button>
      <button class="tab" data-category="Kids">Kids</button>
      <button class="tab" data-category="Religious">Religious</button>
      <button class="tab" data-category="Documentary">Documentary</button>
      <button class="tab" data-category="Movies">Movies</button>
      <button class="tab" data-category="favorites">⭐ Favorites</button>
    </div>
  </nav>

  <main class="container">
    <div class="status-bar">
      <span id="resultCount">Loading…</span>
      <span id="lastWatchedLabel" class="muted-text"></span>
    </div>
    <section id="channelGrid" class="channel-grid" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <p>Built with ❤️ by <a href="https://mdmarufhossen71.site" target="_blank" rel="noopener">Md Maruf Hossen</a> &bull; <a href="https://github.com/MdMarufHossen71/IPTV" target="_blank" rel="noopener">GitHub</a></p>
    <p class="footer-sources">Data aggregated from 15+ open-source IPTV repositories, including <a href="https://github.com/iptv-org/iptv" target="_blank" rel="noopener">iptv-org</a>, <a href="https://github.com/Rakib49/Rakibiptv" target="_blank" rel="noopener">Rakibiptv</a>, <a href="https://github.com/Free-TV/IPTV" target="_blank" rel="noopener">Free-TV</a>, <a href="https://github.com/fanmingming/live" target="_blank" rel="noopener">fanmingming</a>, and more.</p>
  </footer>

  <template id="channelCardTemplate">
    <article class="channel-card" tabindex="0">
      <div class="card-logo-wrap">
        <img class="channel-logo" alt="" loading="lazy" />
        <span class="logo-fallback-text"></span>
        <span class="live-badge">LIVE</span>
        <span class="status-dot" title="Checking…"></span>
      </div>
      <div class="card-body">
        <h3 class="channel-name"></h3>
        <div class="channel-meta">
          <span class="cat-badge"></span>
          <span class="country-badge"></span>
        </div>
        <div class="card-actions">
          <button class="btn btn-watch" type="button">▶ Watch</button>
          <button class="btn btn-fav" type="button" title="Add to favorites">☆</button>
          <button class="btn btn-share" type="button" title="Copy link">🔗</button>
        </div>
      </div>
    </article>
  </template>

  <script src="assets/js/channels.js"></script>
  <script src="assets/js/verify.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
