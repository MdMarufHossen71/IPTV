<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Player</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="alternate icon" href="assets/icons/favicon.ico" />
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.16.1/video-js.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .player-layout { display: grid; gap: 12px; grid-template-columns: 1fr; }
    .player-panel, .sidebar { background: #1d1d1d; border: 1px solid #333; border-radius: 12px; padding: 12px; }
    .player-box { aspect-ratio: 16/9; width: 100%; }
    .video-js { width: 100%; height: 100%; border-radius: 10px; }
    .back-link { display: inline-block; margin-bottom: 10px; color: #fff; text-decoration: none; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; }
    .related-list { display: grid; gap: 8px; }
    .related-item { border: 1px solid #333; border-radius: 8px; padding: 8px; background: #232323; cursor: pointer; }
    @media (min-width: 1000px) { .player-layout { grid-template-columns: 2fr 1fr; } }
  </style>
</head>
<body>
  <main class="container">
    <a class="back-link" href="index.html">← Back to Homepage</a>
    <div class="player-layout">
      <section class="player-panel">
        <div class="player-box">
          <video id="livePlayer" class="video-js vjs-default-skin" controls playsinline></video>
        </div>
        <h2 id="channelName"></h2>
        <p id="channelDescription" class="muted"></p>
        <p id="errorMessage" class="muted"></p>
      </section>
      <aside class="sidebar">
        <h3>Related Channels</h3>
        <div id="relatedChannels" class="related-list"></div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.14/dist/hls.min.js"></script>
  <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
  <script src="assets/js/channels.js"></script>
  <script src="assets/js/player.js"></script>
</body>
</html>
